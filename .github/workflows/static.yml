<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李展博士 · 个人简历</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:  #1a3a5c;
  --accent:   #2e7eed;
  --light-bg: #f4f7fb;
  --border:   #d0dce8;
  --text:     #1e2a38;
  --muted:    #5a6a7a;
  --tag-bg:   #e8f0fb;
  --tag-fg:   #1a4a8c;
}

body {
  font-family: "Noto Serif SC","Source Han Serif CN","SimSun",Georgia,serif;
  font-size: 13.5px;
  line-height: 1.72;
  color: var(--text);
  background: #dde3ed;
  padding: 2rem 1rem 4rem;
}

/* ── 页面容器 ── */
.page {
  max-width: 980px;
  margin: 0 auto;
  background: #fff;
  box-shadow: 0 4px 36px rgba(0,0,0,.14);
  border-radius: 6px;
  overflow: hidden;
}

/* ── Hero ── */
.hero {
  background: linear-gradient(135deg, #1a3a5c 0%, #0d2240 100%);
  color: #fff;
  padding: 2.6rem 3rem 2rem;
  display: flex;
  align-items: flex-end;
  gap: 2rem;
  position: relative;
}
.hero::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0;
  height:4px;
  background:linear-gradient(90deg,var(--accent),#60b0ff,var(--accent));
}
.hero-avatar {
  width:90px; height:90px;
  border-radius:50%;
  background:rgba(255,255,255,.13);
  border:3px solid rgba(255,255,255,.38);
  display:flex; align-items:center; justify-content:center;
  font-size:2.4rem; flex-shrink:0;
}
.hero-info { flex:1; }
.hero-name { font-size:2rem; font-weight:700; letter-spacing:.06em; line-height:1.2; }
.hero-subtitle { font-size:.9rem; color:rgba(255,255,255,.72); margin-top:.3rem; font-style:italic; }
.hero-contacts {
  margin-top:.9rem;
  display:flex; flex-wrap:wrap; gap:.35rem .85rem;
  font-size:.77rem;
}
.hero-contacts a, .hero-contacts span {
  color:rgba(255,255,255,.83); text-decoration:none;
  display:flex; align-items:center; gap:.22rem;
}
.hero-contacts a:hover { color:#fff; text-decoration:underline; }

/* ── 双栏布局 ── */
.body-wrap {
  display: grid;
  grid-template-columns: 1fr 290px;
}

.main-col {
  padding: 1.8rem 2.2rem 2rem 2.5rem;
  border-right: 1px solid var(--border);
  min-width: 0;
}

.side-col {
  padding: 1.8rem 1.6rem 2rem;
  background: var(--light-bg);
  min-width: 0;
}

/* ── 章节 ── */
.section { margin-bottom: 1.6rem; }
.section:last-child { margin-bottom: 0; }

.section-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--primary);
  border-bottom: 2px solid var(--accent);
  padding-bottom: .28rem;
  margin-bottom: .9rem;
  display: flex;
  align-items: center;
  gap: .4rem;
}
.section-title .ico {
  width:19px; height:19px;
  background:var(--accent);
  border-radius:3px;
  display:inline-flex; align-items:center; justify-content:center;
  color:#fff; font-size:.65rem; flex-shrink:0;
}

/* ── 时间线 ── */
.tl-item {
  position:relative;
  padding-left:1.3rem;
  margin-bottom:.8rem;
}
.tl-item::before {
  content:'';
  position:absolute; left:0; top:.56em;
  width:8px; height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 2px rgba(46,126,237,.2);
}
.tl-item:not(:last-child)::after {
  content:'';
  position:absolute; left:3px; top:1.1em;
  width:2px; bottom:-0.75rem;
  background:var(--border);
}
.tl-date { font-size:.72rem; color:var(--accent); font-weight:600; font-family:'Courier New',monospace; margin-bottom:.05rem; }
.tl-role { font-weight:700; font-size:.86rem; }
.tl-org  { font-size:.8rem; color:var(--muted); }

/* ── 通用列表 ── */
.ul {
  list-style:none; padding:0;
}
.ul li {
  padding-left:1.1rem;
  position:relative;
  margin-bottom:.35rem;
  font-size:.8rem;
  line-height:1.6;
}
.ul li::before {
  content:'▸';
  position:absolute; left:0;
  color:var(--accent); font-size:.68rem; top:.15em;
}

/* ── 论文条目 ── */
.pub {
  margin-bottom:.6rem;
  padding: .5rem .75rem;
  border-left:3px solid var(--border);
  border-radius:0 4px 4px 0;
  background:#fafcff;
  font-size:.76rem;
  line-height:1.62;
  transition: border-color .18s;
}
.pub:hover { border-left-color:var(--accent); }
.pub .pt { font-weight:600; color:var(--text); }
.pub .pa { color:var(--muted); font-size:.73rem; }
.pub .pv { font-style:italic; color:var(--accent); font-size:.73rem; }
.badge {
  display:inline-block;
  background:#fff3e0; color:#e65100;
  font-size:.62rem; padding:.03rem .32rem;
  border-radius:99px; font-weight:700;
  margin-left:.28rem; vertical-align:middle;
}
.badge-ca {
  background:#e3f2fd; color:#0d47a1;
}

/* ── 科研项目 ── */
.proj {
  margin-bottom:.6rem;
  padding: .45rem .65rem;
  border-left:3px solid var(--border);
  border-radius:0 4px 4px 0;
  background:#fafcff;
  font-size:.77rem;
  line-height:1.58;
}
.proj:hover { border-left-color:var(--accent); }
.proj .pj-name { font-weight:600; color:var(--text); }
.proj .pj-meta { color:var(--muted); font-size:.72rem; margin-top:.08rem; }
.role-tag {
  display:inline-block;
  font-size:.66rem;
  padding:.02rem .3rem;
  border-radius:3px;
  font-weight:700;
  margin-left:.25rem;
  vertical-align:middle;
}
.role-lead  { background:#e8f5e9; color:#2e7d32; }
.role-co    { background:#e3f2fd; color:#1565c0; }
.role-join  { background:#f3e5f5; color:#6a1b9a; }
.role-bone  { background:#fff8e1; color:#e65100; }

/* ── 侧栏 ── */
.side-sec { margin-bottom:1.5rem; }
.side-sec:last-child { margin-bottom:0; }
.side-title {
  font-size:.82rem;
  font-weight:700;
  color:var(--primary);
  text-transform:uppercase;
  letter-spacing:.08em;
  border-bottom:1px solid var(--border);
  padding-bottom:.22rem;
  margin-bottom:.7rem;
}

.tag-cloud { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.4rem; }
.tag {
  background:var(--tag-bg); color:var(--tag-fg);
  padding:.18rem .55rem;
  border-radius:99px;
  font-size:.7rem; font-weight:600;
  border:1px solid #c5d9f5;
}

.info-row { display:flex; gap:.45rem; font-size:.77rem; margin-bottom:.32rem; align-items:flex-start; }
.info-lbl { color:var(--muted); flex-shrink:0; min-width:48px; }
.info-val { color:var(--text); flex:1; word-break:break-all; }

.patent-item {
  font-size:.77rem;
  margin-bottom:.45rem;
  padding-left:.95rem;
  position:relative; line-height:1.55;
}
.patent-item::before { content:'©'; position:absolute; left:0; color:var(--accent); font-size:.68rem; }

/* ── 评审期刊段落 ── */
.review-block {
  font-size:.74rem; line-height:1.65; color:var(--text);
  background:#fafcff;
  border:1px solid var(--border);
  border-radius:4px;
  padding:.55rem .7rem;
}

/* ── 打印 ── */
@media print {
  body { background:#fff; padding:0; }
  .page { box-shadow:none; border-radius:0; }
}
@media (max-width:700px) {
  .body-wrap { grid-template-columns:1fr; }
  .main-col { border-right:none; border-bottom:1px solid var(--border); }
  .hero { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
